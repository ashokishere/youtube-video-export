name: Export YouTube Videos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Export Videos
        run: |
          mkdir -p output
          mkdir -p state

          CHANNEL_URL="https://www.youtube.com/@YoganandaSRF/videos"

          LAST_RUN_FILE="state/last_run.txt"

          if [ -f "$LAST_RUN_FILE" ]; then
            LAST_RUN=$(cat "$LAST_RUN_FILE")
            echo "Previous run detected: $LAST_RUN"

            yt-dlp --no-flat-playlist \
              --ignore-errors \
              --dateafter "$LAST_RUN" \
              --print "%(upload_date>%Y-%m-%d)s,\"%(title)s\",%(webpage_url)s" \
              "$CHANNEL_URL" \
              > output/new_videos.csv

          else
            echo "First run detected — exporting ALL videos"

            yt-dlp --flat-playlist \
              --ignore-errors \
              --print "%(upload_date>%Y-%m-%d)s,\"%(title)s\",%(webpage_url)s" \
              "$CHANNEL_URL" \
              > output/yogananda_videos.csv
          fi

          date -u +%Y%m%d > "$LAST_RUN_FILE"

      - name: Commit Results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/
          git add state/

          git diff --cached --quiet || (
            git commit -m "Update YouTube exports"
            git push
          )
